<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>


<!-- COUNTDOWN -->

<div id="countPage">
<h1 id="count">3</h1>
</div>


<!-- TEXT PAGE -->

<div id="textPage" class="hidden">

<h1 id="birthdayText">Happy Birthday</h1>

<h2 id="cipiText" class="hidden">Cipi ❤️</h2>

<img id="cartoon" class="hidden" src="cartoon.png">

</div>


<!-- BOOK -->

<div id="bookPage" class="hidden">

<div class="book">

<input type="checkbox" id="c1">
<input type="checkbox" id="c2">

<div id="cover">

<div class="heart">❤️</div>

<h2>Our Memories</h2>

</div>


<div class="flip-book">

<div class="flip" id="p1">

<div class="back">

<div class="book-message">
Selamat ulang tahun sayang ❤️
</div>

<div class="photo-row">

<img src="foto1.jpg">
<img src="foto2.jpg">

</div>

</div>

<label class="next-btn" for="c1">></label>

</div>


<div class="flip" id="p2">

<div class="back">

<div class="book-message">
Semoga kita selalu bersama 💕
</div>

<div class="photo-row">

<img src="foto3.jpg">
<img src="foto4.jpg">

</div>

</div>

<label class="next-btn" for="c2">></label>

</div>


</div>

</div>

</div>


<div id="confetti"></div>

<script src="script.js"></script>

</body>

</html>
