<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- COUNTDOWN -->

<div id="countPage">

<h1 id="count">3</h1>

</div>



<!-- TEXT PAGE -->

<div id="textPage" class="hidden">

<h1 id="birthdayText">Happy Birthday</h1>

<h2 id="cipiText" class="hidden">Cipi ❤️</h2>

<img id="cartoon" class="hidden" src="cartoon.png">

</div>



<!-- BOOK PAGE -->

<div id="bookPage" class="hidden">

<div class="book" id="book">

<!-- COVER -->

<div class="page active cover">

<div class="cover-content">

<div class="heart">❤️</div>

<h2>Our Memories</h2>

</div>

</div>


<!-- PAGE FOTO 1 -->

<div class="page">

<div class="book-message">
Selamat ulang tahun sayang ❤️
</div>

<div class="photo-row">
<img src="foto1.jpg">
<img src="foto2.jpg">
</div>

</div>


<!-- PAGE FOTO 2 -->

<div class="page">

<div class="book-message">
Semoga kita selalu bersama 💕
</div>

<div class="photo-row">
<img src="foto3.jpg">
<img src="foto4.jpg">
</div>

</div>


</div>

<p class="swipe-text">Swipe ke kiri ➜</p>

</div>



<script src="script.js"></script>

</body>

</html>
