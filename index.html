<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<title>Happy Birthday Cipi ❤️</title>

<body>

</audio>

<div id="countPage">

<div id="bookPage" class="hidden">

</div>

<p class="swipe">Klik layar untuk buka halaman</p>

</div>


<!-- FINAL PAGE -->
<div id="finalPage" class="hidden">

<h1 class="finalText">I Love You ❤️</h1>

<div class="heart-gallery">

<img src="foto1.jpg">
<img src="foto2.jpg">

</div>

</html>
